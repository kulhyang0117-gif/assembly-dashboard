<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>조립팀 통합 대시보드</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: #f0f2f5;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── 사이드바 ── */
    .sidebar {
      width: 240px;
      min-width: 240px;
      background: #1a2236;
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 8px rgba(0,0,0,0.18);
      z-index: 10;
    }

    .sidebar-header {
      padding: 28px 20px 20px;
      border-bottom: 1px solid #2d3a52;
    }

    .sidebar-header .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-header .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .sidebar-header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #e2e8f0;
      line-height: 1.3;
    }

    .sidebar-header .subtitle {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 0;
      overflow-y: auto;
    }

    .nav-section-label {
      font-size: 10px;
      font-weight: 600;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 8px 20px 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 20px;
      cursor: pointer;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 500;
      border-left: 3px solid transparent;
      transition: all 0.18s ease;
      user-select: none;
    }

    .nav-item:hover {
      background: #243048;
      color: #e2e8f0;
    }

    .nav-item.active {
      background: #1e3a5f;
      color: #60a5fa;
      border-left-color: #3b82f6;
    }

    .nav-item .nav-icon {
      font-size: 16px;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .nav-item .nav-badge {
      margin-left: auto;
      background: #f59e0b;
      color: #1a2236;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 99px;
    }

    .nav-item .nav-badge.wip {
      background: #374151;
      color: #6b7280;
    }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid #2d3a52;
      font-size: 11px;
      color: #475569;
    }

    /* ── 메인 콘텐츠 ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 0 28px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 16px;
      font-weight: 700;
      color: #1e293b;
    }

    .topbar-meta {
      font-size: 12px;
      color: #94a3b8;
    }

    .content-area {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ── 패널 공통 ── */
    .panel {
      display: none;
      width: 100%;
      height: 100%;
    }

    .panel.active {
      display: flex;
      flex-direction: column;
    }

    /* ── iframe 패널 ── */
    .iframe-panel iframe {
      flex: 1;
      width: 100%;
      border: none;
    }

    /* ── WIP 패널 ── */
    .wip-panel {
      align-items: center;
      justify-content: center;
      background: #f8fafc;
    }

    .wip-box {
      text-align: center;
      padding: 48px 40px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 400px;
    }

    .wip-box .wip-icon {
      font-size: 56px;
      margin-bottom: 20px;
    }

    .wip-box h2 {
      font-size: 20px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 10px;
    }

    .wip-box p {
      font-size: 14px;
      color: #64748b;
      line-height: 1.6;
    }

    .progress-bar-wrap {
      margin-top: 24px;
      background: #e2e8f0;
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 35%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      border-radius: 99px;
      animation: pulse-bar 2s ease-in-out infinite;
    }

    @keyframes pulse-bar {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* ── 파일 업로드 패널 ── */
    .upload-panel {
      background: #f8fafc;
      overflow-y: auto;
      padding: 28px;
    }

    .upload-panel h2 {
      font-size: 18px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 6px;
    }

    .upload-panel .desc {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 24px;
    }

    .upload-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .upload-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      border: 1px solid #e2e8f0;
      transition: box-shadow 0.18s;
    }

    .upload-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.11);
    }

    .upload-card .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .upload-card .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .upload-card .card-label {
      font-size: 14px;
      font-weight: 600;
      color: #1e293b;
    }

    .upload-card .card-sub {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 1px;
    }

    .drop-zone {
      border: 2px dashed #cbd5e1;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.18s;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: #3b82f6;
      background: #eff6ff;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-zone .drop-text {
      font-size: 12px;
      color: #64748b;
      pointer-events: none;
    }

    .drop-zone .drop-text strong {
      color: #3b82f6;
    }

    .file-list {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f1f5f9;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      color: #334155;
    }

    .file-item .file-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-item .file-size {
      color: #94a3b8;
      flex-shrink: 0;
    }

    .file-item .remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #94a3b8;
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
      padding: 0 2px;
    }

    .file-item .remove-btn:hover {
      color: #ef4444;
    }

    .upload-all-btn {
      margin-top: 28px;
      display: flex;
      justify-content: flex-end;
    }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px 28px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.18s;
    }

    .btn-primary:hover {
      opacity: 0.88;
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: default;
    }

    /* 업로드 완료 토스트 */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #10b981;
      color: #fff;
      padding: 12px 22px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      display: none;
      z-index: 100;
      animation: toast-in 0.25s ease;
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- ── 사이드바 ── -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo-row">
      <div class="logo-icon">&#9881;</div>
      <div>
        <h1>조립팀</h1>
        <div class="subtitle">통합 대시보드</div>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section-label">생산 현황</div>

    <div class="nav-item active" data-panel="material" onclick="switchPanel(this)">
      <span class="nav-icon">&#128230;</span>
      <span>생산계획대비 자재현황</span>
    </div>

    <div class="nav-item" data-panel="production" onclick="switchPanel(this)">
      <span class="nav-icon">&#128200;</span>
      <span>생산계획대비 실적현황</span>
    </div>

    <div class="nav-item" data-panel="assembly" onclick="switchPanel(this)">
      <span class="nav-icon">&#128203;</span>
      <span>조립실적 통합관리</span>
      <span class="nav-badge wip">준비중</span>
    </div>

    <div class="nav-section-label" style="margin-top:8px;">품질 / 자료</div>

    <div class="nav-item" data-panel="quality" onclick="switchPanel(this)">
      <span class="nav-icon">&#9989;</span>
      <span>품질관리 교육자료</span>
    </div>

    <div class="nav-item" data-panel="upload" onclick="switchPanel(this)">
      <span class="nav-icon">&#128190;</span>
      <span>파일 업로드</span>
    </div>
  </nav>

  <div class="sidebar-footer">
    &copy; 2026 조립팀 · Production Summary
  </div>
</aside>

<!-- ── 메인 콘텐츠 ── -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">생산계획대비 자재현황</div>
    <div class="topbar-meta" id="topbar-meta">material-shortage.vercel.app</div>
  </div>

  <div class="content-area">

    <!-- 1. 자재현황 -->
    <div class="panel iframe-panel active" id="panel-material">
      <iframe src="https://material-shortage.vercel.app/" title="생산계획대비 자재현황" allowfullscreen></iframe>
    </div>

    <!-- 2. 실적현황 -->
    <div class="panel iframe-panel" id="panel-production">
      <iframe src="https://production-vs-plan.vercel.app/" title="생산계획대비 실적현황" allowfullscreen></iframe>
    </div>

    <!-- 3. 조립실적 통합관리 (WIP) -->
    <div class="panel wip-panel" id="panel-assembly">
      <div class="wip-box">
        <div class="wip-icon">&#128295;</div>
        <h2>조립실적 통합관리</h2>
        <p>현재 개발 중인 메뉴입니다.<br>완성되는 대로 이곳에 연결될 예정입니다.</p>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill"></div>
        </div>
      </div>
    </div>

    <!-- 4. 품질관리 교육자료 -->
    <div class="panel iframe-panel" id="panel-quality">
      <iframe src="https://quality-reflection-meeting.vercel.app/" title="품질관리 교육자료" allowfullscreen></iframe>
    </div>

    <!-- 5. 파일 업로드 -->
    <div class="panel upload-panel" id="panel-upload">
      <h2>파일 업로드</h2>
      <p class="desc">각 항목별로 파일을 선택하거나 드래그&amp;드롭하여 업로드하세요. Excel, CSV 등 모든 형식을 지원합니다.</p>

      <div class="upload-grid" id="upload-grid"></div>

      <div class="upload-all-btn">
        <button class="btn-primary" id="upload-all-btn" onclick="uploadAll()">전체 업로드</button>
      </div>
    </div>

  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast">업로드 완료!</div>

<script>
  // ── 패널 메타 정보 ──
  const panelMeta = {
    material:   { title: '생산계획대비 자재현황',   meta: 'material-shortage.vercel.app' },
    production: { title: '생산계획대비 실적현황',   meta: 'production-vs-plan.vercel.app' },
    assembly:   { title: '조립실적 통합관리',       meta: '개발 진행 중' },
    quality:    { title: '품질관리 교육자료',       meta: 'quality-reflection-meeting.vercel.app' },
    upload:     { title: '파일 업로드',             meta: '데이터 파일 관리' },
  };

  function switchPanel(el) {
    // 활성 nav 변경
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');

    // 패널 전환
    const key = el.dataset.panel;
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + key).classList.add('active');

    // 상단바 업데이트
    document.getElementById('topbar-title').textContent = panelMeta[key].title;
    document.getElementById('topbar-meta').textContent  = panelMeta[key].meta;
  }

  // ── 파일 업로드 카드 정의 ──
  const uploadItems = [
    { key: 'bom',          label: 'BOM',             sub: '자재명세서',          icon: '&#128196;', color: '#dbeafe', iconColor: '#2563eb' },
    { key: 'plan',         label: '생산계획',         sub: 'Production Plan',    icon: '&#128200;', color: '#dcfce7', iconColor: '#16a34a' },
    { key: 'inventory',    label: '재고현황',         sub: 'Inventory Status',   icon: '&#128218;', color: '#fef9c3', iconColor: '#ca8a04' },
    { key: 'packaging',    label: '포장사양',         sub: 'Packaging Spec',     icon: '&#128230;', color: '#fce7f3', iconColor: '#db2777' },
    { key: 'prep',         label: '준비작업 마스터',  sub: 'Preparation Master', icon: '&#9881;',   color: '#f3e8ff', iconColor: '#7c3aed' },
    { key: 'inspection',   label: '투입전 검사 마스터', sub: 'Pre-Input Inspection', icon: '&#128269;', color: '#ffedd5', iconColor: '#ea580c' },
    { key: 'kitting',      label: '키팅된 자재',      sub: 'Kitted Materials',   icon: '&#128210;', color: '#e0f2fe', iconColor: '#0284c7' },
    { key: 'uph',          label: '표준 UPH',         sub: 'Standard UPH',       icon: '&#9201;',   color: '#f0fdf4', iconColor: '#15803d' },
    { key: 'daily',        label: '일일조립실적',     sub: 'Daily Assembly',     icon: '&#128203;', color: '#fef3c7', iconColor: '#d97706' },
    { key: 'downtime',     label: '비가동현황',       sub: 'Downtime Status',    icon: '&#9888;',   color: '#fee2e2', iconColor: '#dc2626' },
    { key: 'defect',       label: '공정불량현황',     sub: 'Process Defect',     icon: '&#128997;', color: '#fce7f3', iconColor: '#be185d' },
    { key: 'defect_scrap', label: '공정불량폐기현황', sub: 'Defect Disposal',    icon: '&#128682;', color: '#f1f5f9', iconColor: '#475569' },
  ];

  // 파일 저장소
  const fileStore = {};
  uploadItems.forEach(item => { fileStore[item.key] = []; });

  function buildUploadGrid() {
    const grid = document.getElementById('upload-grid');
    grid.innerHTML = '';

    uploadItems.forEach(item => {
      const card = document.createElement('div');
      card.className = 'upload-card';
      card.innerHTML = `
        <div class="card-header">
          <div class="card-icon" style="background:${item.color}; color:${item.iconColor}">${item.icon}</div>
          <div>
            <div class="card-label">${item.label}</div>
            <div class="card-sub">${item.sub}</div>
          </div>
        </div>
        <div class="drop-zone" id="drop-${item.key}"
             ondragover="onDragOver(event, '${item.key}')"
             ondragleave="onDragLeave('${item.key}')"
             ondrop="onDrop(event, '${item.key}')">
          <input type="file" multiple onchange="onFileChange(event, '${item.key}')" />
          <div class="drop-text"><strong>클릭</strong> 또는 파일을 여기에 드롭</div>
        </div>
        <div class="file-list" id="list-${item.key}"></div>
      `;
      grid.appendChild(card);
    });
  }

  function onDragOver(e, key) {
    e.preventDefault();
    document.getElementById('drop-' + key).classList.add('dragover');
  }

  function onDragLeave(key) {
    document.getElementById('drop-' + key).classList.remove('dragover');
  }

  function onDrop(e, key) {
    e.preventDefault();
    document.getElementById('drop-' + key).classList.remove('dragover');
    addFiles(key, Array.from(e.dataTransfer.files));
  }

  function onFileChange(e, key) {
    addFiles(key, Array.from(e.target.files));
    e.target.value = '';
  }

  function addFiles(key, files) {
    files.forEach(f => {
      if (!fileStore[key].find(x => x.name === f.name && x.size === f.size)) {
        fileStore[key].push(f);
      }
    });
    renderFileList(key);
  }

  function removeFile(key, idx) {
    fileStore[key].splice(idx, 1);
    renderFileList(key);
  }

  function renderFileList(key) {
    const list = document.getElementById('list-' + key);
    list.innerHTML = '';
    fileStore[key].forEach((f, i) => {
      const item = document.createElement('div');
      item.className = 'file-item';
      item.innerHTML = `
        <span class="file-name" title="${f.name}">${f.name}</span>
        <span class="file-size">${formatSize(f.size)}</span>
        <button class="remove-btn" onclick="removeFile('${key}', ${i})" title="삭제">&#215;</button>
      `;
      list.appendChild(item);
    });
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1024 / 1024).toFixed(1) + ' MB';
  }

  function uploadAll() {
    const total = Object.values(fileStore).reduce((s, arr) => s + arr.length, 0);
    if (total === 0) {
      alert('업로드할 파일이 없습니다.\n각 항목에 파일을 추가해 주세요.');
      return;
    }

    const btn = document.getElementById('upload-all-btn');
    btn.disabled = true;
    btn.textContent = '업로드 중...';

    // 실제 서버 연동 시 이 부분을 교체하세요
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = '전체 업로드';
      showToast(`${total}개 파일 업로드 완료`);
    }, 1200);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
  }

  // 초기화
  buildUploadGrid();
</script>
</body>
</html>
